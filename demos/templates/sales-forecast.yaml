title: "Sales Forecast — Q3 2026"
subtitle: Pipeline health, rep performance, and deal velocity for the quarter.
shell: standard
components:
  - type: meta
    fields:
      - key: Quarter
        value: Q3 2026 (Jul – Sep)
      - key: Last Updated
        value: "2026-07-14"
      - key: Owner
        value: Morgan Ellis, VP Sales
      - key: Pipeline Total
        value: "$4.2M"

  - type: stat_grid
    columns: 4
    stats:
      - label: Pipeline Value
        value: "$4.2M"
        detail: 3.1x coverage on $1.35M target
        color: green
      - label: Weighted Forecast
        value: "$1.18M"
        detail: 87% of quarterly target
        color: teal
      - label: Win Rate
        value: "24%"
        detail: Up from 19% last quarter
        color: green
      - label: Avg Deal Cycle
        value: 47 days
        detail: Down 8 days QoQ
        color: yellow

  - type: section
    eyebrow: Pipeline Health
    heading: Pipeline by Stage
    components:
      - type: markdown
        body: "Deals in each stage as of this week. Conversion rates shown relative to top-of-funnel volume."
      - type: progress_bar
        value: 100
        label: "Prospecting — 142 deals"
        color: default
        detail: Top of funnel. SDR-sourced and inbound combined.
      - type: progress_bar
        value: 63
        label: "Discovery — 89 deals"
        color: teal
        detail: 63% converted from Prospecting. Avg 8 days in stage.
      - type: progress_bar
        value: 33
        label: "Proposal — 47 deals"
        color: green
        detail: 53% converted from Discovery. Avg 12 days in stage.
      - type: progress_bar
        value: 16
        label: "Negotiation — 23 deals"
        color: yellow
        detail: 49% converted from Proposal. Legal and pricing in play.
      - type: progress_bar
        value: 8
        label: "Closed Won — 12 deals"
        color: green
        detail: 52% close rate from Negotiation. $487K ARR booked this quarter.

