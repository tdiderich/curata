            description: "Pulls CRM data, LinkedIn profile, and recent news for an account. Produces a 1-page brief: company snapshot, likely pain points, relevant references from past deals, and suggested talking points. Fires when a deal moves to Qualified in Salesforce."
            links:
              - label: Example output
                href: https://your-workspace.curata.ai/pages/deal-brief-acme-corp
              - label: Config
                href: https://github.com/your-org/agents/blob/main/deal-brief/agent.yaml
          - title: Postmortem Writer
            badge:
              label: Slack Command
              color: green
            description: "Run /postmortem #incident-channel after an incident. The agent reads the thread, pulls the timeline from PagerDuty, and drafts a structured postmortem: timeline, root cause, impact, and action items. Engineers review and sign off before it publishes."
            links:
              - label: Example output
                href: https://your-workspace.curata.ai/pages/postmortem-db-outage-may
              - label: Config
                href: https://github.com/your-org/agents/blob/main/postmortem/agent.yaml
          - title: Code Review Summarizer
            badge:
              label: Git Push Hook
              color: yellow
            description: "Fires on every PR opened against main. Uses Claude to summarize the diff, flag risky changes, and surface relevant past decisions from the architecture archive. Comment appears on the PR within 90 seconds. Does not block merge."
            links:
              - label: Example output
                href: https://your-workspace.curata.ai/pages/pr-review-1847
              - label: Config
                href: https://github.com/your-org/agents/blob/main/pr-summarizer/hook.sh
          - title: Customer Health Scorer
            badge:
              label: Scheduled (Cron)
              color: default
            description: "Runs nightly. Pulls product usage metrics, support ticket volume, NPS responses, and contract renewal date for every active account. Produces a health score and a one-paragraph narrative. CS team reviews the bottom quartile each Monday morning."
            links:
              - label: Example output
