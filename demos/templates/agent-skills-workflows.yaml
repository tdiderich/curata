          - title: Agent runs
            badge:
              label: Step 2
              color: teal
            description: "Claude (or custom script) processes inputs and produces a YAML draft page."
          - title: Draft created
            badge:
              label: Step 3
              color: teal
            description: "Draft page is published to curata with status: draft. Relevant team members are notified in Slack."
          - title: Human review
            badge:
              label: Step 4
              color: yellow
            description: "Reviewer reads the page, annotates anything wrong or missing, and approves or requests changes."
          - title: Published
            badge:
              label: Step 5
              color: green
            description: "Approved pages go live. Rejected pages route back to the agent with annotations as feedback for a revision run."

