  - type: section
    heading: Trigger Configuration
    components:
      - type: markdown
        body: "How to wire up each trigger type. Copy the relevant snippet and drop it in your repo or Slack app configuration."
      - type: accordion
        items:
          - title: Slack Command
            components:
              - type: markdown
                body: |
                  **When it fires:** A team member types a slash command like `/deal-brief @acme-corp` or `/postmortem #incident-123` in any Slack channel.

                  **How to set it up:**
                  1. Create a Slack app in your workspace and add a slash command.
                  2. Point the request URL at your agent runner endpoint (e.g. `https://agents.your-org.internal/slack`).
                  3. The runner parses the command, runs the agent, and posts a Slack notification with the curata page link when done.

                  **Best for:** On-demand tasks where a human decides when to run the agent. Low noise — only fires when someone asks.
              - type: code
                language: yaml
                code: |
                  # agent-runner/config.yaml
                  triggers:
                    - type: slack_command
                      command: /deal-brief
                      agent: deal-brief-agent
                      notify_channel: "#sales-ops"
          - title: API Webhook
            components:
              - type: markdown
                body: |
                  **When it fires:** An external system (Salesforce, HubSpot, Jira, etc.) sends a POST request to your agent runner when a record changes.

                  **How to set it up:**
                  1. In your CRM or ticketing tool, add a webhook that fires on the event you care about (e.g. deal stage change, ticket closed).
                  2. Point it at your runner endpoint with a shared secret for auth.
                  3. The runner maps the payload fields to agent inputs and kicks off the run.

                  **Best for:** Automating output from process steps that already happen in your tooling. Zero extra human effort once wired up.
              - type: code
                language: yaml
                code: |
                  # agent-runner/config.yaml
                  triggers:
                    - type: webhook
                      path: /hooks/salesforce
                      secret_env: SALESFORCE_WEBHOOK_SECRET
                      agent: deal-brief-agent
                      field_map:
                        account_name: "$.record.Name"
                        account_id: "$.record.Id"
                        stage: "$.record.StageName"
                      condition: "stage == 'Qualified'"
          - title: Scheduled (Cron)
            components:
              - type: markdown
                body: |
                  **When it fires:** On a fixed schedule — nightly, weekly, or on any cron expression you define.

                  **How to set it up:**
                  1. Add a cron entry to your agent runner or use a managed scheduler (Railway cron, GitHub Actions schedule, etc.).
                  2. Define the agent, its inputs, and any data sources it should pull at run time.

                  **Best for:** Regular reporting, health checks, and anything that should always be fresh but doesn't need to be real-time. The nightly health scorer is a good pattern to copy.
              - type: code
                language: yaml
                code: |
                  # agent-runner/config.yaml
                  triggers:
                    - type: cron
                      schedule: "0 7 * * 1-5"  # weekdays at 7am UTC
                      agent: customer-health-scorer
                      notify_channel: "#cs-team"
          - title: Git Push Hook
            components:
              - type: markdown
                body: |
                  **When it fires:** On a git event — PR opened, PR merged, commit pushed to main, tag created.

                  **How to set it up:**
                  1. Add a GitHub Actions workflow (or equivalent) that fires on the event you care about.
                  2. The workflow calls your agent runner with the relevant git context (diff, PR title, changed files).

                  **Best for:** Code review summaries, ADR drafts on infra changes, automated changelog entries. Runs in your CI pipeline with no extra human step.
              - type: code
                language: yaml
                code: |
                  # .github/workflows/pr-summary.yml
                  name: PR Summary
                  on:
                    pull_request:
                      types: [opened, synchronize]
                  jobs:
                    summarize:
                      runs-on: ubuntu-latest
                      steps:
                        - uses: actions/checkout@v4
                          with:
                            fetch-depth: 0
                        - name: Run PR summarizer agent
                          env:
                            CURATA_API_KEY: ${{ secrets.CURATA_API_KEY }}
                          run: |
                            bash scripts/pr-summary-agent.sh \
                              --pr "${{ github.event.number }}" \
                              --base "${{ github.base_ref }}"

