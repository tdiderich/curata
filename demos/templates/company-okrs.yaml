  - type: section
    eyebrow: Cross-Team
    heading: Key Dependencies
    components:
      - type: event_timeline
        show_filter_toggle: false
        events:
          - date: "2026-07-21"
            title: "Engineering → Sales: RBAC shipped"
            summary: Unblocks enterprise deals that required multi-user admin controls. Ryan's Meridian deal was gated on this.
            severity: major
            source: Marcus Webb
          - date: "2026-08-01"
            title: "People → Sales: Enterprise AE starts"
            summary: Aisha gets dedicated enterprise closing capacity. Existing AEs will continue owning current enterprise opps through handoff.
            severity: major
            source: Elena Rourke
          - date: "2026-08-15"
            title: "Engineering → Sales: SAML/SSO shipped"
            summary: Required by 4 enterprise prospects. Slippage here directly impacts Q3 enterprise close targets.
            severity: major
            source: Marcus Webb
          - date: "2026-08-15"
            title: "Sales → Product: Enterprise playbook draft due"
            summary: Product needs this to scope the enterprise admin portal. Aisha committed to delivery by Aug 15.
            severity: minor
            source: Aisha Okafor
          - date: "2026-09-01"
            title: "Engineering → CS: Audit log export shipped"
            summary: CS needs this to complete the Fieldstone QBR and unblock contract renewal. High stakes — $2,400/mo account.
            severity: major
            source: Marcus Webb
          - date: "2026-09-15"
            title: "Product → CS: Enterprise admin portal shipped"
            summary: CS can begin self-serve QBR workflows. Reduces James's manual reporting load by an estimated 4 hours/week.
            severity: minor
            source: Priya Kapoor

