title: "Company OKRs — Q3 2026"
subtitle: Objectives and key results for July–September 2026. Owned by leadership, tracked weekly.
shell: standard
components:
  - type: meta
    fields:
      - key: Company
        value: Vantara
      - key: Quarter
        value: Q3 2026 (Jul 1 – Sep 30)
      - key: Owner
        value: Elena Rourke, CEO
      - key: Status
        value: Active
      - key: Last Updated
        value: "2026-07-07"

  - type: markdown
    body: |
      ## Q3 Theme: Earn the Enterprise

      Q2 proved we can grow fast in our SMB base. Q3 is about proving we can sell upmarket.
      We enter the quarter with 12 enterprise opportunities in pipeline and 2 pilots in progress.
      Every team has a role in making enterprise work — it is not just a sales motion.

  - type: callout
    variant: info
    title: Q3 north star
    body: >
      Close 3 enterprise deals (>$24K ACV each) while holding SMB NRR above 100%.
      Prove the unit economics work at both ends of the market before Series B conversations begin.

  - type: section
    eyebrow: Company OKRs
    heading: Company-Level Objectives
    components:
      - type: tree
        show_filter_toggle: true
        nodes:
          - label: "O1 — Win the enterprise segment"
            status: active
            children:
              - label: "KR1.1 — Close 3 enterprise deals (>$24K ACV each)"
                status: active
                note: "0 of 3 closed. 2 pilots in progress, 4 in late-stage."
              - label: "KR1.2 — Ship RBAC and SAML/SSO (enterprise requirements)"
                status: active
                note: "RBAC shipped Jul 21. SAML ETA Aug 15."
              - label: "KR1.3 — Pass security review for 2 enterprise prospects"
                status: active
                note: "1 of 2 complete (Fieldstone). Meridian review scheduled Aug 3."
              - label: "KR1.4 — Achieve $50K ARR from enterprise segment by Sep 30"
                status: active
                note: "Currently $0 from enterprise ARR. On track if pilots convert."
          - label: "O2 — Retain and expand the SMB base"
            status: active
            children:
              - label: "KR2.1 — Maintain NRR >= 102% through Q3"
                status: active
                note: "Q2 exit NRR: 102%. July: 101%. On track."
              - label: "KR2.2 — Reduce time-to-value for new customers from 14 days to 7 days"
                status: active
                note: "Currently 11 days. Onboarding flow redesign shipped Jul 14."
              - label: "KR2.3 — Grow SMB ARR by 22% (from $412K to $503K)"
                status: active
                note: "On pace. Requires 4 net-new SMB customers per month."
              - label: "KR2.4 — Launch in-app expansion playbook for accounts > $400/mo"
                status: upcoming
                note: "ETA: August. CS team leading."
          - label: "O3 — Build the team to scale"
            status: active
            children:
              - label: "KR3.1 — Hire Enterprise AE and Solutions Engineer by Aug 1"
                status: active
                note: "Enterprise AE offer accepted Jul 3. SE search in progress."
              - label: "KR3.2 — Complete 30/60/90 onboarding framework for all new hires"
                status: completed
                note: "Shipped by Rosa Jun 30. In use for all Q3 hires."
              - label: "KR3.3 — Achieve eNPS of 40+ in the August pulse survey"
                status: upcoming
                note: "Q2 eNPS was 34. Targeting improvement through manager 1:1 training."
              - label: "KR3.4 — Document all core system architecture by Sep 15"
                status: active
                note: "Marcus owns. 40% complete. Reduces key-person risk."

  - type: section
    eyebrow: Team OKRs
    heading: Team-Level Objectives
    components:
      - type: accordion
        items:
          - title: "Engineering — Q3 Objectives"
            components:
              - type: markdown
                body: |
                  **Owner:** Marcus Webb, CTO

                  **O1 — Ship the enterprise feature set on schedule**
                  - KR: RBAC in production by Jul 21 ✓
                  - KR: SAML/SSO in production by Aug 15
                  - KR: Audit log export (CSV + API) by Sep 1
                  - KR: 99.9% uptime through Q3 (no enterprise-impacting incidents)

                  **O2 — Reduce technical debt that blocks scale**
                  - KR: Migrate from single-tenant to multi-tenant data model by Sep 30
                  - KR: Reduce P95 API latency from 340ms to under 200ms
                  - KR: Increase test coverage from 52% to 70%

                  **O3 — Knowledge distribution**
                  - KR: Architecture docs for all 5 core subsystems published in Notion
                  - KR: At least 2 engineers can deploy and roll back without Marcus present
          - title: "Product — Q3 Objectives"
            components:
              - type: markdown
                body: |
                  **Owner:** Priya Kapoor, Head of Product

                  **O1 — Define and validate the enterprise product motion**
                  - KR: Complete discovery interviews with all 12 enterprise pipeline accounts
                  - KR: Publish enterprise product spec with 3 signed-off design partners
                  - KR: Ship enterprise admin portal (billing, user management, SSO config) by Sep 15

                  **O2 — Improve SMB activation and time-to-value**
                  - KR: Redesign onboarding flow (target: 7-day time-to-value)
                  - KR: Increase template library from 12 to 30 templates
                  - KR: Raise 30-day activation rate from 61% to 75%

                  **O3 — Establish a consistent research cadence**
                  - KR: 20 customer interviews completed in Q3
                  - KR: Monthly product newsletter to customers launched by Aug 1
          - title: "Sales — Q3 Objectives"
            components:
              - type: markdown
                body: |
                  **Owner:** Aisha Okafor, Head of Sales

                  **O1 — Close enterprise deals**
                  - KR: 3 enterprise deals closed (target: $72K combined ACV)
                  - KR: 8 enterprise deals in active stage (Discovery or later) at quarter-end
                  - KR: Enterprise win rate of at least 25%

                  **O2 — Sustain SMB new business**
                  - KR: 14 net-new SMB customers per month (42 for the quarter)
                  - KR: Maintain blended CAC below $2,800
                  - KR: 80% of AEs at or above quota

                  **O3 — Build the enterprise playbook**
                  - KR: Document ICP, champion profile, and objection library for enterprise by Aug 15
                  - KR: Run 2 enterprise proof-of-concept engagements with structured success criteria
          - title: "Customer Success — Q3 Objectives"
            components:
              - type: markdown
                body: |
                  **Owner:** James Okonkwo, Head of Customer Success

                  **O1 — Drive expansion and NRR**
                  - KR: NRR >= 102% at quarter-end
                  - KR: 8 expansion deals closed (upsells to higher tier or seat additions)
                  - KR: Gross churn < 1.5% of ARR

                  **O2 — Scale the CS model for enterprise**
                  - KR: Create enterprise customer success playbook (QBR template, health scoring, escalation path)
                  - KR: Conduct QBRs with all accounts > $500/mo by Sep 15
                  - KR: Achieve CSAT > 4.5/5 on post-onboarding survey

                  **O3 — Build early warning infrastructure**
                  - KR: Define and instrument 5 leading indicators of churn in product analytics
                  - KR: Weekly health score report for all accounts in place by Aug 1

