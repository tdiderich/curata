  - type: section
    heading: Deployment Playbook
    components:
      - type: accordion
        items:
          - title: "Phase 1: Kickoff & Discovery"
            components:
              - type: markdown
                body: |
                  **Goal:** Align on scope, timeline, and success criteria before any technical work begins.

                  - [ ] Send welcome email with kickoff agenda and pre-read materials
                  - [ ] Schedule kickoff call with executive sponsor, project owner, and technical lead
                  - [ ] Complete discovery questionnaire (use cases, integrations, user volume)
                  - [ ] Confirm go-live target date and milestone dependencies
                  - [ ] Identify all stakeholders and map to roles (champion, technical lead, exec sponsor)
                  - [ ] Share implementation project plan and get sign-off
                  - [ ] Provision sandbox environment and send credentials
                  - [ ] Log kickoff notes and open items in tracker

          - title: "Phase 2: Technical Integration"
            components:
              - type: markdown
                body: |
                  **Goal:** Complete all technical setup so the production environment is ready for testing.

                  - [ ] Provision production environment and confirm access
                  - [ ] Configure SSO / identity provider (SAML, OIDC, or SCIM as applicable)
                  - [ ] Set up API credentials and validate endpoint connectivity
                  - [ ] Complete data mapping and field configuration workshop
                  - [ ] Configure webhooks or data pipeline (SFTP, API push, or native integration)
                  - [ ] Import initial data set and validate record counts
                  - [ ] Complete security review and penetration test if required by customer
                  - [ ] Engineering sign-off: integration checklist complete

          - title: "Phase 3: Testing & UAT"
            components:
              - type: markdown
                body: |
                  **Goal:** Customer validates the solution against their real workflows and signs off.

                  - [ ] Distribute UAT credentials and test plan to customer stakeholders
                  - [ ] Conduct UAT kickoff walkthrough session
                  - [ ] Customer completes test scenarios across all primary workflows
                  - [ ] Log bugs and issues; triage by severity (high / medium / low)
                  - [ ] Resolve all high-severity bugs before proceeding
                  - [ ] Re-test resolved issues and confirm customer acceptance
                  - [ ] Collect UAT sign-off from project owner and executive sponsor
                  - [ ] Run performance / load test if above threshold user volume
                  - [ ] Document any open low-severity items for post-launch backlog

          - title: "Phase 4: Go-Live & Handoff"
            components:
              - type: markdown
                body: |
                  **Goal:** Execute cutover to production and transition account to Customer Success.

                  - [ ] Confirm go-live date and communicate to all stakeholders
                  - [ ] Complete go-live readiness checklist (integrations, data, SSO, users)
                  - [ ] Disable sandbox environment and revoke test credentials
                  - [ ] Execute cutover — migrate final data snapshot to production
                  - [ ] Validate post-cutover: spot-check key workflows with customer
                  - [ ] Send go-live announcement to customer stakeholders
                  - [ ] Schedule 7-day post-launch check-in call
                  - [ ] Complete internal implementation retrospective
                  - [ ] Hand off account to Customer Success with full context doc
                  - [ ] Close implementation project in tracker

  - type: callout
