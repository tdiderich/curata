  - type: section
    eyebrow: Still Deciding
    heading: Open Questions
    components:
      - type: accordion
        items:
          - title: Should we build a native Slack app or use Zapier for Slack?
            components:
              - type: markdown
                body: |
                  **Context:** Building a native Slack app (OAuth, slash commands, event subscriptions) is 6–8 weeks of eng work. A Zapier integration could cover 80% of use cases in 2 weeks.

                  **Arguments for native:** Richer experience, better for positioning, customers prefer not needing Zapier.

                  **Arguments for Zapier first:** Faster, lower risk, lets us validate demand before investing in native.

                  **Decision needed by:** June 15 (before Q3 sprint planning)

                  **Owner:** Lena to decide with Marcus and Jordan (Sales).
          - title: What is the right pricing model for AI features?
            components:
              - type: markdown
                body: |
                  **Context:** The Automation theme introduces AI-powered features (deduplication, auto-tagging). These have marginal inference costs. Options: (a) include in existing tiers, (b) usage-based add-on, (c) higher tier only.

                  **Risk of gating:** Reduces adoption, harder to build the data flywheel that makes the models better.

                  **Risk of including:** Margin impact if usage is higher than modeled. Need cost estimates from Marcus first.

                  **Decision needed by:** August 1 (before Q4 planning)

                  **Owner:** Derek Walsh to make final call after Lena's recommendation.
          - title: Do we need SOC 2 Type II before the EU data residency launch?
            components:
              - type: markdown
                body: |
                  **Context:** EU customers and prospects are asking for SOC 2 Type II. Our current Type I was completed in March. Type II requires a 6-month observation window — earliest completion is September.

                  **Risk:** Launching EU data residency without Type II may not satisfy enterprise legal/security review, making the feature unusable for the customers who need it most.

                  **Options:** (a) delay EU launch to Q1 2027 until Type II is complete, (b) launch EU in Q4 with Type I + GDPR DPA, let customers decide.

                  **Decision needed by:** June 1

                  **Owner:** Derek Walsh + Legal.
          - title: Should we open-source the integration SDK?
            components:
              - type: markdown
                body: |
                  **Context:** We are building a JavaScript/Python SDK for API v2. Open-sourcing it could accelerate adoption, surface bugs faster, and improve developer trust.

                  **Risk:** Competitors can study our API design. Support burden for community contributions.

                  **Precedent:** Segment, Mixpanel, and Amplitude all open-source their SDKs. No evidence it hurt them.

                  **Decision needed by:** July 1 (before SDK v1 ships)

                  **Owner:** Marcus Chen (engineering) + Derek Walsh.
