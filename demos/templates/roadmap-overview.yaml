      - type: card_grid
        min_width: 240
        cards:
          - title: Enterprise Scale
            badge:
              label: Theme 1
              color: green
            description: Remove every bottleneck that prevents customers from deploying Acme across their entire organization. SSO, bulk operations, admin controls, audit logs. Target segment — 500+ seat accounts.
          - title: Integrations Platform
            badge:
              label: Theme 2
              color: teal
            description: Build a first-class integration layer so customers can connect Acme to the rest of their stack without engineering involvement. Native connectors for Salesforce, HubSpot, and Slack in H2. REST webhooks GA.
          - title: Intelligent Automation
            badge:
              label: Theme 3
              color: yellow
            description: Surface AI-powered suggestions and automations that reduce manual work for ops users. Smart deduplication, auto-tagging, workflow triggers. Foundation for our AI positioning in 2027.
          - title: Developer Experience
            badge:
              label: Theme 4
              color: default
            description: Make Acme the most developer-friendly tool in the category. API v2 GA, Terraform provider, expanded webhooks, public Postman collection. Reduces time-to-integration from days to hours.

