  - type: section
    eyebrow: Team Updates
    heading: What Each Team Shipped
    components:
      - type: accordion
        items:
          - title: Engineering — 4 highlights
            components:
              - type: markdown
                body: |
                  **Shipped:**
                  - Bulk import API (v1) — handles up to 10,000 rows via streaming upload. Marcus + Leila. Closes 14 tickets.
                  - Database query optimizer pass — P99 latency down from 210ms to 68ms on the `/feed` endpoint.
                  - Upgraded to Next.js 15.3 — zero regressions in CI, bundle size -8%.
                  - Webhook retry logic with exponential backoff — reduces missed events from ~2% to <0.05%.

                  **In progress:**
                  - SSO (SAML) implementation — 60% done, targeting next Thursday
                  - Background job queue migration from Sidekiq → BullMQ — schema migration drafted

                  **Notes:** On-call rotation updated. New primary: Rahul Singh (May 11–18).
          - title: Product — 3 highlights
            components:
              - type: markdown
                body: |
                  **Shipped:**
                  - Finalized PRD for Bulk Import v2 (scheduled export + FTP/SFTP sources) — approved by Lena and Derek.
                  - Completed Q2 discovery sprint interviews — 14 sessions, synthesis published in Notion.
                  - Launched internal beta of the new dashboard redesign with 8 power users.

                  **In progress:**
                  - API v2 launch checklist — 73% complete, targeting May 22 GA
                  - H2 roadmap draft — first pass complete, review scheduled Thursday

                  **Notes:** User research report available in Notion → Product → Research → Q2 2026.
          - title: Design — 2 highlights
            components:
              - type: markdown
                body: |
                  **Shipped:**
                  - Dashboard redesign: all 6 screens handed off to Engineering. Figma link in Slack #design-handoffs.
                  - Updated brand guidelines — new icon library (240 icons) published to Storybook.

                  **In progress:**
                  - Mobile onboarding flow — wireframes in review, needs PM sign-off
                  - Bulk import UI — waiting on final API spec from Marcus

                  **Notes:** Design review cadence moving to Tuesdays 3pm starting next week.
          - title: Sales — 3 highlights
            components:
              - type: markdown
                body: |
                  **Highlights:**
                  - 3 new enterprise trials started (Thornwood Capital, Kestrel Foods, Axiom Health)
                  - Closed Meridian Logistics — $42K ARR, 12-month contract
                  - Pipeline review: 8 deals in late stage, $310K combined ARR potential

                  **Blockers:**
                  - SOC 2 report requested by Thornwood and Axiom — waiting on Security team (see blockers below)
                  - Demo environment was down Wednesday afternoon (2hr impact) — please fix escalation path

                  **Next week:** QBR prep for Meridian, Kestrel proof-of-concept kickoff

