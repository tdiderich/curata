  - type: section
    eyebrow: Issues
    heading: Open Blockers
    components:
      - type: card_grid
        min_width: 280
        cards:
          - title: SOC 2 report not ready
            badge:
              label: Sales Blocker
              color: red
            description: Thornwood Capital and Axiom Health both requested the SOC 2 Type II report before signing. Security team estimates 2 more weeks. Sales may lose both deals if delayed.
          - title: Background job migration risk
            badge:
              label: Eng Blocker
              color: red
            description: BullMQ migration requires a 20-minute maintenance window. Cannot schedule until load testing is complete. Currently blocking the Q2 performance milestone.

  - type: divider

  - type: section
    eyebrow: Decisions
    heading: Key Decisions Made This Week
    components:
      - type: definition_list
        items:
          - term: API v2 GA date set to May 22
            definition: Accepted the timeline proposed by Marcus. Engineering committed to freeze the spec by May 13. Marketing will prepare launch comms by May 19. Decision owner — Derek Walsh.
          - term: Deferred FTP source support to Bulk Import v3
            definition: FTP/SFTP proved more complex than estimated (auth edge cases, firewall rules). Moving it to the next cycle. Lena confirmed customer priority is lower than SFTP — SFTP-only customers are <8% of requests.
          - term: Adopted Playwright for E2E testing
            definition: Replacing Cypress. Faster in CI, better TypeScript support. Migration plan drafted by Rahul — old Cypress tests remain until parallel coverage is confirmed.
          - term: On-call rotation expanded to Product
            definition: Starting June 1, product managers join on-call as "incident liaison" — no hands-on-keyboard, but reachable for priority triage during P1/P2 incidents.

  - type: divider

  - type: section
    eyebrow: Looking Ahead
    heading: Next Week Priorities
    components:
      - type: card_grid
        min_width: 240
        cards:
          - title: API spec freeze
            badge:
              label: Engineering
              color: green
            description: Bulk Import v2 and API v2 specs must be finalized by Wednesday May 13. No new scope after freeze.
          - title: SSO beta launch
            badge:
              label: Engineering
              color: green
            description: Internal SAML SSO available for dogfooding by Friday May 15. Target 5 internal users for initial test.
          - title: H2 roadmap review
            badge:
              label: Product
              color: teal
            description: Leadership review Thursday May 15 at 2pm. Lena to present 3 strategic themes with high-level feature breakdown.
          - title: SOC 2 escalation
            badge:
              label: Security
              color: red
            description: Derek to meet with Security lead Monday to assess whether accelerated timeline is possible. Decision by EOD Tuesday.
          - title: Kestrel POC kickoff
            badge:
              label: Sales
              color: yellow
            description: Jordan leading. Technical requirements call Wednesday, demo environment provisioned by Thursday. 30-day POC window.
