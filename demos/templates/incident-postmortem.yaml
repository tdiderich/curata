  - type: section
    eyebrow: What Happened
    heading: Incident Summary
    components:
      - type: markdown
        body: |
          On May 8, 2026 at 14:03 UTC, our API gateway in us-east-1 began returning HTTP 503 errors across all endpoints. The outage lasted 47 minutes and affected all 1,840 customers whose traffic routes through us-east-1.

          The root cause was a misconfigured health check in the deployment of **api-gateway v2.14.1**, released at 13:58 UTC. The new version changed the health check endpoint from `/health` to `/api/v1/health` but the ALB target group health check was not updated before traffic was cut over. The gateway nodes appeared unhealthy to the load balancer and were deregistered, causing all traffic to hit no healthy targets and return 503.

          The fix was a one-line change to the ALB health check path, rolled out at 14:48 UTC. Traffic recovered fully within 2 minutes.

