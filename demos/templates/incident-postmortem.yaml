  - type: section
    eyebrow: Root Cause
    heading: Root Cause Analysis
    components:
      - type: callout
        variant: danger
        title: Root cause — Health check path mismatch between deployment and load balancer config
        body: "api-gateway v2.14.1 changed the health check endpoint from /health to /api/v1/health as part of a path standardization effort. The deployment pipeline and PR review process did not surface this as an infra-impacting change. The ALB target group was not updated before the cutover. This is a deployment process gap, not a code bug."
      - type: markdown
        body: |
          **Five whys:**

          1. **Why did the API return 503s?** The ALB had no healthy targets registered.
          2. **Why were there no healthy targets?** ALB health checks were failing because the health endpoint path changed.
          3. **Why did the health endpoint path change?** v2.14.1 standardized all API paths to `/api/v1/*` — this was intentional and correct.
          4. **Why wasn't the ALB updated first?** The deployment checklist does not require engineers to check whether infra config depends on any path that changed in the release.
          5. **Why does the checklist not cover this?** We have never had an incident caused by a health check path change before. The checklist was last updated in 2025 and predates our path standardization initiative.

          **5th why answer is the root cause:** Our deployment process has no mechanism to detect when application changes require corresponding infra changes before cutover.

  - type: divider

  - type: section
    eyebrow: Contributing Factors
    heading: Contributing Factors
    components:
      - type: accordion
        items:
          - title: No automated infra/app change dependency detection
            components:
              - type: markdown
                body: |
                  The CI/CD pipeline validates the application build, runs unit and integration tests, and checks smoke tests. It does not compare application-level config (health check paths, port bindings, environment variables) against the corresponding infrastructure config.

                  A static analysis step or a deployment pre-check that flags "this release changes a path that appears in Terraform" would have caught this before it reached production.
          - title: Deployment checklist did not prompt for infra review
            components:
              - type: markdown
                body: |
                  The release checklist has 14 items, none of which ask "does this release change any paths, ports, or endpoints that are referenced in ALB, security groups, or Terraform?" The checklist was written before the API path standardization project.

                  The v2.14.1 PR had a clear mention of `/health` → `/api/v1/health` in the description. A checklist item would have prompted the deployer to check the Terraform config.
          - title: ALB health check configuration not in the same repo as application config
            components:
              - type: markdown
                body: |
                  The application code lives in `api-gateway/` and the Terraform config lives in `infrastructure/`. When Chris made the path change in the application, there was no natural moment to check the Terraform file.

                  If the ALB health check path was co-located with the application config (e.g., a `service.yaml` that Terraform reads), this drift would have been impossible.
          - title: Two-engineer approval process delayed the fix by ~9 minutes
            components:
              - type: markdown
                body: |
                  Our change management policy requires two SRE approvals for any production Terraform apply during an incident. Ben Morales was unavailable. Getting Priya's approval took 12 minutes from the time Layla staged the fix.

                  During a P1 with 1,840 customers down, 12 minutes is a meaningful delay. The policy needs an exception path for single-approver emergency changes with after-the-fact review.
          - title: Initial triage focused on database before deployment
            components:
              - type: markdown
                body: |
                  First response instinct was "database issue" because that is the most common cause of 503s in our system. The 13:58 deployment was not surfaced in the incident timeline view until Chris looked manually.

                  A better dashboard would show recent deployments on the same timeline as the error rate spike, making the correlation immediate.

