  - type: section
    eyebrow: Retrospective
    heading: Lessons Learned
    components:
      - type: definition_list
        items:
          - term: Config co-location beats docs
            definition: Keeping the ALB health check path in a file that the application team owns would have made this drift impossible. Documentation and checklists are second-best; making the wrong thing hard to do is better.
          - term: Deployment checklists must be maintained like code
            definition: A checklist written in 2025 does not cover architectural patterns introduced in 2026. Checklists should be reviewed after every incident and after every major architectural change. Assign an owner.
          - term: Recent deployments belong on every incident dashboard
            definition: The first thing an on-call engineer should see alongside a 503 spike is "was there a deploy in the last 15 minutes?" That correlation should be automatic, not manual.
          - term: Approval policies need P1 exception paths
            definition: A two-engineer approval policy designed for normal change management adds meaningful delay during a P1. Emergency approval paths with mandatory post-incident review are standard practice — we should adopt them.
          - term: MTTR is the metric that matters
            definition: We detected the incident in 2 minutes (fast). We identified root cause in 16 minutes (good). We took 29 minutes to apply a one-line fix (too slow). Improving MTTR means streamlining the fix path, not just detection.
          - term: Smoke tests are not a substitute for infra validation
            definition: All smoke tests passed in CI because they tested the application, not the interaction between the application and the load balancer. End-to-end infra validation is a gap we need to address.

