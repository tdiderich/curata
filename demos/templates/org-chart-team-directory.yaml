  - type: section
    eyebrow: Norms
    heading: How We Work
    components:
      - type: definition_list
        items:
          - term: All-hands
            definition: "Every other Monday at 9am PT. 45 minutes: metrics review, product demo, one team spotlight, open Q&A. Recording posted in Notion same day."
          - term: 1:1 cadence
            definition: "Weekly 1:1s for all direct reports. Managers own the calendar invite. Agenda is employee-led — managers come prepared but follow the employee's priorities."
          - term: Decision-making
            definition: "We default to the person closest to the work. Decisions under $5K and reversible are made by the DRI (Directly Responsible Individual) without approval. Irreversible or cross-functional decisions get a brief async writeup in Notion first."
          - term: Default communication channel
            definition: "Slack for async. Linear for product/eng work. Notion for documents and decisions. Email is reserved for external parties. If something is urgent and time-sensitive, call or text — Slack is not guaranteed to be monitored in real time."
          - term: Remote policy
            definition: "Remote-first with a San Francisco hub. In-person weeks twice per year (all-hands offsite). SF team works from the office Tuesdays and Thursdays. All meetings have a Zoom link regardless of who is in person."
          - term: Feedback culture
            definition: "We use the SBI model (Situation, Behavior, Impact) for feedback. Direct is kind. Anonymous feedback forms are available quarterly but direct conversation is always preferred."

