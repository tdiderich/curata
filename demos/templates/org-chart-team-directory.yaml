            description: "Your first call. HR paperwork, benefits enrollment, equipment setup, access provisioning. Slack: @rosa"
          - title: Marcus Webb
            badge:
              label: Engineering
              color: green
            description: "Engineering onboarding, dev environment setup, codebase walkthrough. Schedule a 90-minute session in your first week. Slack: @marcus"
          - title: Priya Kapoor
            badge:
              label: Product
              color: teal
            description: "Product orientation: current roadmap, open specs, how to give feedback. Ask for access to the Product wiki in Notion. Slack: @priya"
          - title: James Okonkwo
            badge:
