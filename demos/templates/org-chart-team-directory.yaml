              color: yellow
            description: "Shadow a customer call in your first two weeks regardless of role. James coordinates shadowing. Slack: @james"

  - type: callout
    variant: info
    title: This is a curata template.
    body: Clone it to your workspace and your agents will use this structure when building team directory pages. Replace the placeholder names, roles, and norms with your actual team. This page works well as a living document — your HR or ops tooling can update it automatically when people join or leave.
