  - type: section
    eyebrow: Design
    heading: UI Description
    components:
      - type: columns
        equal_heights: false
        columns:
          - - type: markdown
              body: |
                **Import wizard — 3 steps:**

                **Step 1 — Upload**
                Full-width dropzone with dashed border. Accepts drag-and-drop or click-to-browse. Shows file name, size, and estimated row count after selection. "Start import" CTA is disabled until a valid file is selected.

                **Step 2 — Map columns**
                Two-column table: left column shows headers detected in the file, right column shows a dropdown of Acme field names. Required fields are marked with a red asterisk. Auto-maps exact matches. User manually maps mismatches.

                **Step 3 — Review and confirm**
                Summary card: N rows detected, N fields mapped, N required fields satisfied. If validation pre-check finds issues, shows a warning with a count. "Import now" CTA proceeds to async processing. User is redirected to import history page.
            - type: markdown
              body: |
                **Import history table:**

                Shows last 30 imports in reverse chronological order. Columns: started at, filename, status (processing / success / partial / failed), total rows, imported rows, errors. Click any row to open the detail view.

                **Import detail view:**

                Shows full metadata plus a downloadable error report (CSV) listing each failed row with column name and error message. Status badge is color-coded: green = success, yellow = partial, red = failed.

                **Email notification:**

                Sent to the user who triggered the import. Subject: "Your import is complete — N rows imported". Body includes summary stats and a deep link to the import detail view.

