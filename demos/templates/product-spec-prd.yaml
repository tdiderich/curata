  - type: section
    eyebrow: Background
    heading: Problem Statement
    components:
      - type: markdown
        body: |
          ## Why we are building this

          Acme's core workflow requires customers to get their existing data into the platform before they can see value. Today, the only option is manual row-by-row entry or a self-serve CSV upload limited to 500 rows. Neither works for enterprise customers.

          During Q1 discovery, **11 of 14 interviewed customers** cited data import as their #1 activation blocker. Our largest churned account (Meridian — $67K ARR) cited it explicitly in their exit survey. Sales is losing an estimated 2 deals per month where the prospect's data volume exceeds 500 rows.

          The proposed Bulk Import feature allows customers to upload files up to 1M rows via a drag-and-drop UI or direct API. Files are processed asynchronously with progress tracking, validation error reporting, and partial success handling. This unblocks enterprise activation and removes the most-cited friction point in our onboarding funnel.

