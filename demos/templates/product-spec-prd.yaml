          - [ ] API endpoint documented in developer docs
          - [ ] Customer-facing help article published (Intercom)
          - [ ] Account managers briefed — demo script and FAQ prepared
          - [ ] Feature flag enabled for 5 beta customers (Kestrel, Thornwood, + 3 TBD)
          - [ ] Beta feedback collected and no P0 bugs open
          - [ ] General availability rollout approved by Lena and Derek
