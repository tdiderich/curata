  - type: section
    eyebrow: Talk Tracks
    heading: Competitor-Specific Talk Tracks
    components:
      - type: accordion
        items:
          - title: "Siftly — When they lead with 'no SQL required'"
            components:
              - type: markdown
                body: |
                  **Their angle:** Siftly sells simplicity. Their demo is slick, self-serve, and targets analysts who are frustrated waiting on data teams.

                  **Your response:**
                  - Agree that self-serve matters, then pivot: "The question isn't whether your analysts can query data — it's whether your systems can keep up with how your team actually works today. Do your analysts mostly pull reports, or are they also working alongside AI agents that generate and synthesize outputs?"
                  - Siftly has no agent integration. If they are using Claude, Cursor, or any AI tooling, the outputs live nowhere. Ask: "Where does that work go today?"
                  - **Proof point:** Meridian Health chose us over Siftly because their ops team had 4 active AI agents producing outputs weekly — Siftly couldn't ingest any of it.

                  **Landmine to plant:** "Ask Siftly how they handle agent-generated content. It will come up — better to get ahead of it."
          - title: "Cortex Analytics — When they lead with 'pay only for what you use'"
            components:
              - type: markdown
                body: |
                  **Their angle:** Consumption pricing sounds attractive early in the process. Cortex reps frame it as "you're not paying for seats that aren't being used."

                  **Your response:**
                  - Surface the unpredictability risk early: "Consumption pricing is great in theory. In practice, every customer I talk to who migrated off Cortex told me the same thing — their bills at scale were 30–40% higher than the initial estimate. Is your finance team comfortable with variable software spend?"
                  - Pull up our pricing calculator with a realistic usage scenario. Show the predictable number vs. the Cortex estimate.
                  - **Proof point:** Stackline Commerce moved off Cortex after 14 months specifically because of budget overruns. They're a referenceable customer — ask your AE.

                  **Ask the champion:** "When you present options to finance, do they prefer predictable SaaS line items or variable usage-based costs?"
          - title: "Lumio — When it's a price objection"
            components:
              - type: markdown
                body: |
                  **Their angle:** Lumio is the low-cost alternative. Reps will be told "Lumio does the same thing for half the price."

                  **Your response:**
                  - Don't fight on price. Reframe on TCO and risk: "Lumio is a great fit for teams that need basic dashboards and have an IT team that can manage the integrations. Can I ask — how much of your ops team's time goes into maintaining data pipelines today?"
                  - Lumio has no SSO (added cost), no audit logging (compliance risk), and no dedicated CSM under $50K ARR. Build out the real cost: "Once you add SSO, audit, and factor in self-managed integrations, the delta tends to be much smaller than it looks."
                  - **Proof point:** Forgepoint Capital received an InfoSec rejection of Lumio during vendor review because it lacked SOC 2. We were the only qualified option.

                  **Qualification signal:** If the buyer is truly price-constrained, ask about their security and compliance requirements. Lumio usually fails the infosec checklist.
          - title: "Vantage BI — Displacing an entrenched install"
            components:
              - type: markdown
                body: |
                  **Their angle:** Vantage is an entrenched platform. They will compete on switching costs, installed base familiarity, and relationship leverage.

                  **Your response:**
                  - Find the fracture point. Nobody evaluates alternatives unless something is broken. Ask: "What's prompting you to look at this now? Something must have changed."
                  - Common fracture points: Vantage's legacy architecture doesn't support real-time data, their roadmap hasn't shipped meaningful features in 2+ years, or a new VP came in and questioned the existing stack.
                  - Frame the switch cost differently: "Yes, migration takes time. The question is whether the cost of staying on Vantage for 3 more years is higher than the cost of switching now. Let's build that math together."
                  - **Proof point:** DataPipe ran a 60-day parallel evaluation. We won because our agent integration saved their ops team an estimated 12 hours/week — Vantage couldn't come close.

                  **Deal strategy:** Always get to the economic buyer early. Vantage will mobilize their account exec to call the VP. You need a sponsor above the Vantage relationship.

