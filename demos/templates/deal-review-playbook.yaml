  - type: section
    eyebrow: Qualification
    heading: Deal Qualification Checklist
    components:
      - type: markdown
        body: "Run through this checklist before every deal review. Unchecked items are action items for the AE."
      - type: markdown
        body: |
          - [x] Executive sponsor identified and engaged
          - [x] Economic buyer confirmed (can sign without further approval)
          - [x] Technical buyer / champion identified
          - [x] Defined business problem with quantified impact
          - [x] Decision criteria documented and shared back to prospect
          - [x] Decision timeline confirmed with hard date
          - [ ] Budget confirmed — in-period, approved, or in cycle
          - [ ] Paper process mapped (legal, procurement, InfoSec, IT)
          - [x] Competitive landscape confirmed — all vendors in eval identified
          - [ ] Reference check scheduled or completed
          - [ ] Multi-threaded — at least 3 contacts engaged
          - [x] Champion coached on internal selling process

  - type: divider

  - type: section
    eyebrow: Qualification Framework
    heading: MEDDPICC Scoring
    components:
      - type: markdown
        body: "Score each dimension 1–3. Deals scoring below 16 total should be reviewed for disqualification or recalibration. Current total: **20 / 24**."
      - type: table
        filterable: false
        columns:
          - key: dimension
            label: Dimension
          - key: score
            label: Score
            align: center
          - key: evidence
            label: Evidence / Notes
          - key: action
            label: Next Action
        rows:
          - dimension: "M — Metrics"
            score: "3"
            evidence: "Ops team loses ~14 hrs/week to manual reconciliation. $180K annual labor cost quantified."
            action: Include in proposal summary and exec deck
          - dimension: "E — Economic Buyer"
            score: "3"
            evidence: "CFO (Sandra Osei) attended demo. Confirmed budget authority and Q2 fiscal close window."
            action: Keep warm — send CFO-specific ROI one-pager
          - dimension: "D — Decision Criteria"
            score: "2"
            evidence: "Security, integration depth, and pricing documented. Weighting not confirmed."
            action: Ask champion to rank criteria before next call
          - dimension: "D — Decision Process"
            score: "2"
            evidence: "Internal demo to steering committee May 19. Procurement involved but process unclear."
            action: Map procurement steps; ask champion for paper process doc
          - dimension: "P — Identify Pain"
            score: "2"
            evidence: "VP Ops has pain confirmed. CFO has not verbalized pain — ROI framing needed."
            action: Send ROI model to CFO before steering committee demo
          - dimension: "I — Implicate the Pain"
            score: "3"
            evidence: "Quantified impact presented and accepted by VP Ops. Urgency tied to Q2 fiscal deadline."
            action: Reinforce urgency in next touchpoint
          - dimension: "C — Champion"
            score: "3"
            evidence: "Derek Park (VP Ops) is strong champion. Has presented internally and requested exec access for us."
            action: Coach Derek on how to handle Siftly comparison internally
          - dimension: "C — Competition"
            score: "2"
            evidence: "Siftly confirmed in eval. No other vendors identified but intel is incomplete."
            action: Ask champion directly if any other vendors are being considered

