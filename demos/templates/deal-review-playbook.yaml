  - type: section
    eyebrow: Objection Handling
    heading: Common Objections and Responses
    components:
      - type: accordion
        items:
          - title: "'Siftly does the same thing for less money.'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** Siftly is in the eval and pricing came up. Someone — probably a technical buyer — is anchoring on headline price.

                  **Response:**
                  Acknowledge, then reframe on total value: "We hear that a lot in the first pass. The teams that do a side-by-side on feature parity and TCO usually find the gap is much smaller than it looks — and sometimes inverted once you add Siftly's SSO add-on, self-managed integrations, and the fact that they have no agent integration story.

                  "Can I ask — how many AI agents does your team currently run? That's usually the deciding factor. Siftly's new Agent Connect feature is read-only and in beta. If Derek's team is using Claude, Cursor, or any AI tooling, where do those outputs go today?"

                  **Proof point to share:** Stackline Commerce short-listed Siftly. After a 3-week parallel eval, they chose us because Siftly could not ingest agent-generated outputs. Ask the AE for the case study.
          - title: "'We need to involve procurement and this is going to take 90 days.'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** Procurement was pulled in late and they don't have a clear deadline. The champion may not have socialized urgency internally.

                  **Response:**
                  Don't fight the timeline — work it: "That makes sense, and we want to make procurement easy. Can you help me understand what typically drives a fast versus slow procurement cycle here? The reason I ask is that Sandra mentioned Q2 fiscal close. Is that a hard deadline for new contracts, or flexible?"

                  Surface the urgency math: "If this slips to Q3, Derek's team is looking at another quarter of manual reconciliation — that's roughly $45K in avoidable labor cost and another quarter without the integration parity your data team needs. Is there a way to start procurement in parallel with the steering committee review so we can compress the timeline?"

                  **Action:** Ask champion to intro you to Lisa Drummond (procurement) now. Get the paper process doc this week.
          - title: "'We're not sure the ROI justifies the price premium over what we have today.'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** The economic buyer hasn't connected the dots between the operational pain and the cost. This is a signal that the ROI model hasn't reached the right person.

                  **Response:**
                  "I want to make sure we're giving you something concrete to work with. We built a model based on what Derek shared — 14 hours/week of manual reconciliation across 3 ops analysts at Meridian's fully-loaded labor rate. That's approximately $180K/year in direct cost, before we account for error rates and the reporting delay.

                  "At $148K ARR, you're looking at breakeven inside 12 months, with compounding savings after that. Can I send Sandra a one-page version of that model directly? I want her to have the numbers before the steering committee review."

                  **Proof point:** Use the ROI calculator template. Send it to the economic buyer, not just the champion.
          - title: "'Can you match Siftly's price?'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** Procurement or the economic buyer is testing for flexibility. Siftly may have sharpened their pencil.

                  **Response:**
                  Don't immediately discount. Hold on value: "I appreciate the directness. Before I go back to look at what we can do, I want to make sure I understand what we'd be trading. Are you asking because the value case isn't clear, or because you have a budget ceiling that we're bumping up against?

                  "If it's a value question, let's spend 15 minutes on the ROI model. If it's a budget ceiling, I can take that to our team — but I'll need to understand what a yes looks like so I'm not going back empty-handed."

                  **Escalation path:** AEs can offer 10% for annual prepay or a phase-in on seat count. Anything beyond that needs VP Sales approval. Do not give away margin without documented budget constraint.
          - title: "'Your security questionnaire is going to take forever to complete.'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** InfoSec is a gating step and IT teams know security reviews delay software purchases. Tom Welk (CISO) hasn't started.

                  **Response:**
                  Get ahead of it proactively: "We've done this a lot — security reviews are one of the most predictable things we can help you accelerate. We have a pre-completed CAIQ questionnaire, our SOC 2 Type II report, and a standard security FAQ that answers about 80% of what we get from InfoSec teams.

                  "Would it help if I sent those directly to Tom before he sends us a questionnaire? In our experience, it cuts review time from 3–4 weeks to 1–2 weeks because most of the common questions are already answered."

                  **Action:** Send security packet to Jordan today. Jordan to ask Derek for Tom Welk's direct email.
          - title: "'We want to pilot before we commit to full deployment.'"
            components:
              - type: markdown
                body: |
                  **Why they say it:** Risk aversion, or the champion needs internal proof before the steering committee will approve.

                  **Response:**
                  "A pilot makes sense, and we do them in a specific way to make sure they're conclusive rather than open-ended. We'd want to define: a specific use case (the reconciliation workflow), a 30-day timeline, success criteria you'd actually use to make a decision, and the key stakeholders who need to see the results.

                  "If Derek's team can commit 3 hours total over 30 days and we can agree on what a win looks like, I'm confident we can run a tight POC. The risk is an open-ended eval that takes 90 days and doesn't produce a decision. Can we get on a call with Derek and Ray to define the scope?"

                  **Deal note:** Pilot requests often signal low champion strength. Confirm Derek can actually mobilize the team for 3 hours before agreeing to a pilot scope.

