  - type: section
    eyebrow: Criteria
    heading: Hiring Criteria by Role
    components:
      - type: accordion
        items:
          - title: "Enterprise Account Executive"
            components:
              - type: markdown
                body: |
                  **Must-haves**
                  - 4+ years in a quota-carrying AE role at a B2B SaaS company
                  - Proven experience closing deals $25K–$150K ACV with 60–120 day cycles
                  - Comfortable selling to technical buyers (VP Eng, CTO, VP Ops)
                  - Strong written communication — our sales process is async-heavy

                  **Nice-to-haves**
                  - Sold workflow automation, integration, or developer tooling
                  - Experience in a startup (< 50 people) environment
                  - Existing relationships in mid-market tech or professional services

                  **Red flags**
                  - Only PLG or product-qualified-lead experience (needs to hunt)
                  - No examples of multi-threaded deals (single-champion close is a risk at enterprise)
                  - Compensation expectations above band with no negotiation flexibility
          - title: "Solutions Engineer"
            components:
              - type: markdown
                body: |
                  **Must-haves**
                  - 3+ years in a pre-sales or solutions engineering role
                  - Can write code (Python or JavaScript) and speak credibly to a technical audience
                  - Experience running technical POCs with structured success criteria
                  - Excellent verbal communication — will be on customer calls daily

                  **Nice-to-haves**
                  - Background in software engineering before moving to pre-sales
                  - Experience with workflow automation or API-first products
                  - Can demo independently without needing an AE in the room

                  **Red flags**
                  - No actual coding ability — "I used to code but it's been years" is a risk
                  - Defensive or flustered when customers ask unexpected technical questions
                  - Has never worked in a startup; only large-company SE motion
          - title: "Senior Full-Stack Engineer"
            components:
              - type: markdown
                body: |
                  **Must-haves**
                  - 4+ years building production web applications
                  - Deep TypeScript and React experience (our stack)
                  - Comfortable owning features end-to-end: schema design, API, UI, deployment
                  - Writes tests without being asked

                  **Nice-to-haves**
                  - PostgreSQL experience at meaningful scale
                  - Has built multi-tenant SaaS infrastructure before
                  - Experience with Prisma, Postgres, and a Node.js API layer
                  - OSS contributions or public work samples

                  **Red flags**
                  - Cannot explain their past technical decisions (coasted vs. drove)
                  - Take-home submission shows no test coverage
                  - Expects heavyweight process (lengthy planning, many approvals) — we move fast
          - title: "Customer Success Manager"
            components:
              - type: markdown
                body: |
                  **Must-haves**
                  - 2+ years in a B2B SaaS customer success or account management role
                  - Comfortable owning a book of business of 30–60 SMB/mid-market accounts
                  - Data-driven: tracks health scores, usage, and engagement proactively
                  - Collaborative with Product — brings customer feedback with evidence, not just anecdotes

                  **Nice-to-haves**
                  - Experience at a PLG company (usage-led expansion motions)
                  - Has built or improved an onboarding program before
                  - Comfortable doing light technical troubleshooting (no coding required)

                  **Red flags**
                  - Defines success entirely as "customers are happy" without metrics
                  - Has never done an upsell or expansion conversation
                  - Reactive-only — waits for customers to reach out vs. monitoring proactively
          - title: "Head of Marketing"
            components:
              - type: markdown
                body: |
                  **Must-haves**
                  - 5+ years in B2B SaaS marketing, with at least 2 years in a leadership role
                  - Has built demand gen and content programs from scratch (not just maintained them)
                  - Analytical: can connect marketing activity to pipeline and revenue
                  - Good writer — will be shaping our voice and putting pen to paper early

                  **Nice-to-haves**
                  - Experience marketing to technical buyers or a developer-adjacent audience
                  - Has owned a product marketing function alongside demand gen
                  - Comfortable being the first marketing hire (no big team to inherit)

                  **Red flags**
                  - Expects a large budget and team immediately — we are early
                  - Portfolio shows only top-of-funnel awareness work, no pipeline attribution
                  - Has not directly written content (delegates everything to writers/agencies)

  - type: section
    eyebrow: Process
    heading: Interview Process
    components:
      - type: timeline
        items:
          - name: "Recruiter screen (30 min) — Rosa or Ashby Sourcing"
            status: completed
          - name: "Hiring manager screen (45 min) — video call"
            status: completed
          - name: "Take-home or async exercise (2–4 hours, paid for eng roles)"
            status: active
          - name: "Panel loop (3 hours) — 3–4 interviewers, structured rubric"
            status: active
          - name: "Final interview with Elena (30 min) — values and fit"
            status: upcoming
          - name: "Reference checks (2–3 references, Rosa conducts)"
            status: upcoming
          - name: "Offer extended within 48 hours of final interview"
            status: upcoming

  - type: section
    eyebrow: Compensation
    heading: Compensation Bands
    components:
      - type: markdown
        body: >
          Bands reflect our Series A stage and San Francisco / remote mix. We pay at the
          50th–65th percentile of market based on Radford data (updated Q1 2026). Equity
          ranges assume 4-year vest with 1-year cliff.
      - type: table
        columns:
          - key: level
            label: Level
          - key: base_range
            label: Base Range
          - key: equity_range
            label: Equity Range (4yr)
          - key: examples
            label: Example Roles
        rows:
          - level: Entry-level IC (L1)
            base_range: "$75K – $95K"
            equity_range: "0.05% – 0.10%"
            examples: "SDR, Support"
          - level: Mid-level IC (L2)
            base_range: "$110K – $140K"
            equity_range: "0.10% – 0.20%"
            examples: "SWE, CSM, PM"
          - level: Senior IC (L3)
            base_range: "$150K – $185K"
            equity_range: "0.20% – 0.40%"
            examples: "Sr. SWE, Enterprise AE, Solutions Eng"
          - level: Staff IC (L4)
            base_range: "$185K – $220K"
            equity_range: "0.35% – 0.60%"
            examples: "Staff Eng, Principal PM"
          - level: Manager / Director (M1)
            base_range: "$160K – $200K"
            equity_range: "0.30% – 0.55%"
            examples: "Head of Marketing, Eng Manager"
          - level: Senior Director / VP (M2)
            base_range: "$200K – $250K"
            equity_range: "0.50% – 0.90%"
            examples: "VP Eng, VP Sales, VP Marketing"

  - type: section
