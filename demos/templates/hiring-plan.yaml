              color: green
            description: >
              Marcus is the bottleneck on SAML, audit logs, and the multi-tenant migration.
              This hire directly removes a Q3 roadmap risk. Offer out — follow up Aug 5.
          - title: Head of Marketing
            badge:
              label: "P1 — Q3 Target"
              color: teal
            description: >
              We have $8M in the bank and no marketing. Word-of-mouth has carried us to $412K ARR
              but we need a repeatable inbound motion before Series B conversations. First marketing
              hire is high-leverage.
          - title: Customer Success Manager
            badge:
              label: "P1 — Q3 Target"
              color: teal
            description: >
              James is running 45 accounts solo. Above 50 accounts we will start to see quality
              drop. This hire protects our NRR, which is the most important metric heading into
              enterprise expansion.
          - title: Backend Engineer + SDR
            badge:
              label: "P2 — Q4 Planned"
              color: yellow
            description: >
              Infrastructure needs more capacity as we onboard enterprise customers. SDR pipeline
              gen will matter once the enterprise AE is ramped and needs top-of-funnel volume.
              Both are Q4 hires gated on Q3 performance.

  - type: callout
