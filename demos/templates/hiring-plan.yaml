    body: Clone it to your workspace and your agents will use this structure when building hiring plan pages. Replace the placeholder roles, pipeline counts, and comp bands with your actual data. Your ATS (Ashby, Greenhouse, Lever) can update pipeline stages and candidate counts automatically via a curata integration.
