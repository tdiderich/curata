  - type: section
    eyebrow: Evaluation Criteria
    heading: How We Evaluate Tools
    components:
      - type: definition_list
        items:
          - term: Business justification
            definition: Every tool must have a named owner and a clear use case. "Nice to have" and "we might use it someday" are not justifications. If a tool has no active champion, it goes on the cancellation list.
          - term: Seat utilization
            definition: Tools with less than 70% seat utilization are candidates for seat reduction at renewal. Tools below 40% utilization are flagged for evaluation or cancellation.
          - term: Overlap review
            definition: Before renewing any tool, check whether another tool in the inventory already covers the use case. Current overlap suspects — ZoomInfo vs. Clearbit, Zoom vs. Google Meet, Vercel vs. Railway.
          - term: Security posture
            definition: All tools with access to customer data or production systems must support SSO (SAML/OIDC) and have completed a security review. Tools without SSO are flagged — see risk section below.
          - term: Spend efficiency
            definition: Compare cost per active user, not cost per licensed seat. A tool at $45/seat/month with 90% utilization is more efficient than one at $30/seat/month with 40% utilization.
          - term: Renewal negotiation
            definition: Renewals above $10K should always be negotiated. Standard asks — multi-year discount (10–20%), seat-count flexibility, and annual invoice instead of monthly. Never auto-renew a contract above $10K without a negotiation call.

  - type: divider

  - type: section
    eyebrow: Risk
    heading: Risk Flags
    components:
      - type: callout
        variant: danger
        title: Single-owner tools — 4 tools have one named owner with no documented backup
        body: "Gong (Morgan Ellis), Retool (Ben Morales), Chili Piper (Sam Holbrook), and Clearbit (Tara Webb) each have a single owner with no documented secondary contact or runbook. If the owner departs or is unavailable, access and renewal decisions may be delayed. Action: Dana to assign secondary owners and document admin credentials in 1Password before June 1."
      - type: callout
        variant: warn
        title: No SSO on 3 tools — Expensify, Loom, and Canva
        body: "Expensify, Loom, and Canva do not support SAML-based SSO on their current plan tiers. Employees log in with individual passwords, which bypasses our MFA enforcement. These tools do not have access to customer data, but they do hold financial data (Expensify) and company brand assets (Canva). Action: Layla to assess whether plan upgrades to enable SSO are cost-justified. If not, document and accept the risk."
      - type: callout
        variant: warn
        title: Potential overlap — ZoomInfo + Clearbit renewing within 48 hours of each other
        body: "ZoomInfo renews May 31 and Clearbit renews June 1. Both provide B2B contact and firmographic data enrichment. Renewing both without a consolidation decision is a $32,400/yr commitment we may not need in full. Jordan Vance and Tara Webb to meet before May 27 and recommend one tool for consolidation."
      - type: callout
        variant: info
        title: This is a curata template.
        body: Clone this inventory template to your workspace and your agents will keep it current by syncing with your finance system, flagging upcoming renewals, and surfacing utilization data from vendor dashboards. Replace the placeholder tools, costs, and owners with your actual vendor inventory.
