name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install kazam
        run: |
          curl -fL https://github.com/tdiderich/kazam/releases/latest/download/kazam-linux-amd64 \
            -o /usr/local/bin/kazam && chmod +x /usr/local/bin/kazam
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --target deps .
