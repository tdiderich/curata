name: Sync downstream

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger maze-apps sync
        run: |
          gh api repos/AtlasSecurityInc/maze-apps/dispatches \
            --method POST \
            --field event_type=curata-sync \
            --field "client_payload[sha]=${{ github.sha }}" \
            --field "client_payload[ref]=${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.MAZE_APPS_DISPATCH_TOKEN }}
