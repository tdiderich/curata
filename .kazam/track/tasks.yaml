  status: closed
  priority: 15
  task_type: task
  assignee: claude
  note: |
    Two changes:
    1. When user is on a personal email (gmail, hotmail, msn, yahoo, outlook, etc.), hide the auto-join domain setting — it doesn't make sense for personal domains.
