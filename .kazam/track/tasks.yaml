- id: kz-g002
  title: 'CLI: build `curata publish` command'
  status: closed
  priority: 2
  task_type: task
  note: |
    Thin wrapper around existing agent API. Core GTM feature.
    Input: file path or stdin (markdown, YAML). `curata publish findings.md` or `echo "..." | curata publish --title "Research notes"`
    Auth: API key via CURATA_API_KEY env var or ~/.curata/config.yaml
    Output: URL of published page printed to stdout
    Errors: auth failure, file not found, page limit exceeded (free tier)
    Naming decision needed: `kazam publish` subcommand vs separate `curata` binary.
    Estimate: ~4 hours. See design doc Dependencies section for full spec.
  created: 2026-05-10T21:00:00.000000-05:00
  updated: 2026-05-10T21:16:23.954043-05:00
  closed: 2026-05-10T21:16:23.954043-05:00
