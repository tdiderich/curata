- id: kz-p002
  title: 'Bug: short-lived API keys persist in DB/UI after expiry'
  status: closed
  priority: 15
  task_type: bug
  assignee: claude
  note: |
    Short-lived API keys (1-hour TTL for agent invitations) are not cleaned up after expiry.
    They remain visible in the UI and stored in the DB.
    Options: cron job to delete expired keys, or filter them out of UI queries, or soft-delete on expiry check.
    At minimum, don't show expired keys in the UI.
