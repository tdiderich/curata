- id: kz-d001
  title: 'Demos: re-research top 10 GTM targets with new schema'
  status: closed
  priority: 4
  task_type: task
  note: |
    The research prompt, schema, and page template have been updated to match new positioning:
    - "Where your AI work lives" (not "AI-native knowledge base")
    - Pain = AI work disappears (not docs go stale)
    - Show what agents PRODUCE worth keeping (not what tools to integrate)
    - Use-case agnostic — don't prescribe how they should use curata

    Re-research these 10 companies (best GTM fit: AI-native, 5-30 people, heavy AI tool usage):
    1. Cognition (Devin — AI coding lab, agents are their entire product)
    2. LangChain (LLM framework — team lives in AI tooling)
    3. Stainless (API platform — generates SDK docs/code with AI)
    4. Raycast (dev productivity — ships AI features, small team)
    5. Fireworks AI (AI model serving — eats their own cooking)
    6. OpenRouter (AI platform — routes LLM calls, deeply technical)
    7. Sema4.ai (AI agents for knowledge workers — direct overlap)
    8. copy.ai (AI copywriting — generates tons of AI output daily)
    9. Doppler (secrets management — dev-focused, YC alumni)
    10. Basis (AI accounting agents — agents ARE the product)

    For each company:
    1. Read demos/research-prompt.md for the prompt template
    2. Read demos/research-schema.json for the output schema
    3. Research using web search (public sources only)
    4. Write JSON to demos/outreach/research/<slug>.json
    5. Run: bun demos/batch-generate.ts --slug <slug>

    Key rules for research:
    - Pain framing is about AI OUTPUTS disappearing, not docs going stale
    - example_outputs field (not example_pages): what do their agents produce that's worth keeping?
    - Don't prescribe integrations. Show the output, not the plumbing.
    - ai_tools_used field: which AI tools does this company likely use?
    - Be use-case agnostic in the page template — let THEM decide what curata is for
  created: 2026-05-10T22:00:00.000000-05:00
  updated: 2026-05-11T08:04:29.053709-05:00
  closed: 2026-05-11T08:04:29.053709-05:00
  close_reason: 'Re-researched 11 companies with new schema: Cognition, LangChain, Stainless, Raycast, Fireworks AI, OpenRouter, Sema4.ai, Doppler, Basis, Auctor, Harmonic. All JSONs use example_outputs, ai_tools_used, and new pain framing. Replaced copy.ai (acquired) with Auctor + Harmonic.'
